name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22.12.0'
  # Build-time placeholder; runtime URL is supplied via secrets in deployment env.
  DATABASE_URL: 'mysql://siakad:siakad@localhost:3306/siakad'
  AUTH_SESSION_SECRET: 'placeholder_session_secret_for_ci_only_change_in_prod'
  AUTH_JWT_SECRET: 'placeholder_jwt_secret_for_ci_only_change_in_production_now'
  REDIS_URL: 'redis://localhost:6379/0'

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
      - run: npm test --silent

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
      - run: npm run build
