name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: '1.3.13'
  # Build-time placeholder; runtime URL is supplied via secrets in deployment env.
  DATABASE_URL: 'mysql://siakad:siakad@localhost:3306/siakad'
  AUTH_SESSION_SECRET: 'placeholder_session_secret_for_ci_only_change_in_prod'
  AUTH_JWT_SECRET: 'placeholder_jwt_secret_for_ci_only_change_in_production_now'
  REDIS_URL: 'redis://localhost:6379/0'

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - run: bun run format:check
      - run: bun run lint
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - run: bun run test

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - run: bun run build
