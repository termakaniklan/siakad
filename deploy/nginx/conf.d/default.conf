upstream siakad_app {
    server app:3000;
    keepalive 32;
}

# HTTP -> HTTPS redirect (uncomment in production once certs are mounted at /etc/nginx/certs)
# server {
#     listen 80 default_server;
#     listen [::]:80 default_server;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;

    server_name _;

    # Defense-in-depth headers (Next.js sets the same; nginx copy is a safety net)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # Login: very tight rate limit (mitigates credential stuffing)
    location = /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://siakad_app;
    }

    # PPDB submission: tight rate limit per IP
    location = /api/ppdb/submit {
        limit_req zone=ppdb burst=4 nodelay;
        limit_req_status 429;
        proxy_pass http://siakad_app;
    }

    # General API: generous baseline
    location /api/ {
        limit_req zone=api burst=60 nodelay;
        limit_req_status 429;
        proxy_pass http://siakad_app;
    }

    # Long-cache static assets emitted by Next.js
    location /_next/static/ {
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_pass http://siakad_app;
    }

    location / {
        proxy_pass http://siakad_app;
    }
}
