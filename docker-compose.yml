# Production-grade local stack for SIAKAD.
# Usage:
#   cp .env.example .env   # then edit values
#   docker compose up -d
#
# Services:
#   - app    : Next.js standalone runtime
#   - worker : BullMQ background worker (notifications, audit dispatch)
#   - mariadb: primary RDBMS
#   - redis  : cache + queue + rate limit
#   - nginx  : reverse proxy with TLS termination + extra headers + rate limit

services:
  app:
    build: .
    image: siakad/app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://${DB_USER:-siakad}:${DB_PASSWORD:-siakad}@mariadb:3306/${DB_NAME:-siakad}?connection_limit=20
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build: .
    image: siakad/app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://${DB_USER:-siakad}:${DB_PASSWORD:-siakad}@mariadb:3306/${DB_NAME:-siakad}?connection_limit=10
      REDIS_URL: redis://redis:6379/0
    command: ["node", "node_modules/.bin/tsx", "src/shared/queue/worker.ts"]
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpw}
      MARIADB_DATABASE: ${DB_NAME:-siakad}
      MARIADB_USER: ${DB_USER:-siakad}
      MARIADB_PASSWORD: ${DB_PASSWORD:-siakad}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test:
        - "CMD"
        - "healthcheck.sh"
        - "--connect"
        - "--innodb_initialized"
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro

volumes:
  mariadb_data:
  redis_data:
